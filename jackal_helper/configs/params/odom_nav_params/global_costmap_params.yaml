global_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5
  publish_frequency: 4
  width: 40.0
  height: 40.0
  resolution: 0.05
  origin_x: -20.0
  origin_y: -20.0
  static_map: true          # 启用静态层（关键）
  rolling_window: false
  # 无需重复声明plugins，复用common的配置，static_layer会生效
