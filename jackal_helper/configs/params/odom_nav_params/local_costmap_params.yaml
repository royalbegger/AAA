local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 10.0
  publish_frequency: 5.0
  width: 10.0
  height: 10.0
  resolution: 0.05
  static_map: false         # 禁用静态层（关键）
  rolling_window: true      # 局部地图滚动（符合需求）
  # 复用common的plugins，但static_map: false会让static_layer不加载
